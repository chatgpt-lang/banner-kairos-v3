.b-back-r{position:absolute;right:-22px;top:-24px;width:235px;height:510px;z-index:11;transform:rotate(16deg);filter:drop-shadow(2px 3px 8px rgba(0,0,0,0.65));mix-blend-mode:screen;}
.b-back-r img{width:100%;height:100%;object-fit:contain;transform:perspective(350px) rotateY(-18deg) scaleX(0.88);}
.disp{position:absolute;left:50%;top:-50px;transform:translateX(-50%) rotate(6deg);width:388px;height:550px;z-index:15;}
.disp img{width:100%;height:100%;object-fit:contain;}
.cr1{position:absolute;right:200px;top:-55px;width:210px;height:462px;z-index:13;transform:rotate(-10deg);filter:drop-shadow(3px 3px 10px rgba(0,0,0,0.75));}
.cr1 img{width:100%;height:100%;object-fit:contain;transform:perspective(380px) rotateY(14deg) scaleX(0.9);}
.cr2{position:absolute;right:52px;top:-38px;width:228px;height:448px;z-index:17;transform:rotate(7deg);}
.cr2 img{width:100%;height:100%;object-fit:contain;transform:perspective(380px) rotateY(-14deg) scaleX(0.9);}
.motion-enabled .bg{animation:bannerBgDrift calc(9s * var(--motion-speed-factor,1)) ease-in-out infinite alternate;transform-origin:center;}
.motion-enabled .logo-wrap,.motion-enabled .text-zone,.motion-enabled .dispo-outer,.motion-enabled .bl,.motion-enabled .b-back-l,.motion-enabled .b-back-r,.motion-enabled .disp,.motion-enabled .cr1,.motion-enabled .cr2{animation:bannerFloat calc(var(--motion-duration,4s) * var(--motion-speed-factor,1)) ease-in-out infinite;will-change:translate;}
.motion-enabled .logo-wrap{--motion-x:calc(2px * var(--motion-mult,.45));--motion-y:calc(-7px * var(--motion-mult,.45));--motion-duration:4.8s;}
.motion-enabled .text-zone{--motion-x:calc(-2px * var(--motion-mult,.45));--motion-y:calc(5px * var(--motion-mult,.45));--motion-duration:5.6s;}
.motion-enabled .dispo-outer{--motion-x:calc(3px * var(--motion-mult,.45));--motion-y:calc(-5px * var(--motion-mult,.45));--motion-duration:4.4s;}
.motion-enabled .bl{--motion-x:calc(5px * var(--motion-mult,.45));--motion-y:calc(-10px * var(--motion-mult,.45));--motion-duration:5.1s;}
.motion-enabled .b-back-l{--motion-x:calc(-6px * var(--motion-mult,.45));--motion-y:calc(8px * var(--motion-mult,.45));--motion-duration:5.4s;}
.motion-enabled .b-back-r{--motion-x:calc(6px * var(--motion-mult,.45));--motion-y:calc(-8px * var(--motion-mult,.45));--motion-duration:5.9s;}
.motion-enabled .disp{--motion-x:calc(0px * var(--motion-mult,.45));--motion-y:calc(-9px * var(--motion-mult,.45));--motion-duration:4.9s;}
.motion-enabled .cr1{--motion-x:calc(-5px * var(--motion-mult,.45));--motion-y:calc(-8px * var(--motion-mult,.45));--motion-duration:5.2s;}
.motion-enabled .cr2{--motion-x:calc(5px * var(--motion-mult,.45));--motion-y:calc(7px * var(--motion-mult,.45));--motion-duration:4.7s;}
@keyframes bannerFloat{0%,100%{translate:0 0;}50%{translate:var(--motion-x,0) var(--motion-y,-6px);}}
@keyframes bannerBgDrift{0%{transform:scale(1);filter:brightness(0.78) saturate(2.0) contrast(1.12);}100%{transform:scale(1.035);filter:brightness(0.83) saturate(2.1) contrast(1.14);}}
@media (prefers-reduced-motion:reduce){.motion-enabled *{animation:none!important;}}
</style>
</head>
<body>
<script>
const p = new URLSearchParams(window.location.search);
const g = k => p.get(k) || '';
document.addEventListener('DOMContentLoaded', function() {
  configureMotion();
  document.querySelector('.bg').style.backgroundImage = "url('" + g('bg_url') + "')";
  document.querySelector('.bl img').src = g('booster_url');
  document.querySelector('.logo-mega').src = g('logo_url');
  document.querySelectorAll('.b-back-l img, .b-back-r img').forEach(el => el.src = g('booster_url'));
  document.querySelector('.disp img').src = g('display_url');
  document.querySelector('.cr1 img').src = g('card2_url');
  document.querySelector('.cr2 img').src = g('card1_url');
  const t1 = g('titre_ligne1'), t2 = g('titre_ligne2');
  ['dt1a','dt1b','dt1c','dt1d','dt1e'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = t1; });
  ['dt2a','dt2b','dt2c','dt2d','dt2e'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = t2; });
  const col1 = g('col1'), col2 = g('col2'), col3 = g('col3'), col4 = g('col4'), outline = g('col_outline');
  document.querySelectorAll('.c0').forEach(el => { el.style.webkitTextStroke = '0px transparent'; el.style.color = 'transparent'; el.style.display = 'none'; });
  document.querySelectorAll('.c2').forEach(el => el.style.webkitTextStroke = '4px ' + outline);
  const grad = 'linear-gradient(180deg,' + col1 + ' 0%,' + col2 + ' 25%,' + col3 + ' 48%,' + col3 + ' 52%,' + col4 + ' 75%,' + outline + ' 100%)';
  document.querySelectorAll('.c4').forEach(el => {
    el.style.background = grad;
    el.style.webkitBackgroundClip = 'text';
    el.style.backgroundClip = 'text';
    el.style.webkitTextFillColor = 'transparent';
    el.style.color = 'transparent';
  });
  const glow = g('col_glow'), glow2 = g('col_glow2');
  document.querySelector('.disp').style.filter = 'drop-shadow(0 0 6px ' + glow + ') drop-shadow(0 0 16px ' + glow2 + ') drop-shadow(0 8px 20px rgba(0,0,0,0.9))';
  document.querySelector('.cr2').style.filter = 'drop-shadow(0 0 5px ' + glow + ') drop-shadow(0 0 14px ' + glow2 + ') drop-shadow(-3px 3px 10px rgba(0,0,0,0.8))';
  document.querySelectorAll('.dispo-line')[0].textContent = g('dispo_ligne1_en') || g('dispo_ligne1');
  document.querySelectorAll('.dispo-line')[1].textContent = (g('dispo_m_en') || g('dispo_m')) + (g('dispo_reste_en') || g('dispo_reste'));
  fitTitle();
});
function fitTitle() {
  const block = document.getElementById('titleBlock');
  const spans = block.querySelectorAll('.t');
  const ref1 = document.getElementById('dt1e'); const ref2 = document.getElementById('dt2e');
  const maxTitleWidth = 390;
  let size = 100, minSize = 46;
  spans.forEach(s => s.style.fontSize = size + 'px');
  while (size > minSize) {
    if (ref1.scrollWidth <= maxTitleWidth && ref2.scrollWidth <= maxTitleWidth) break;
    size -= 1;
    spans.forEach(s => s.style.fontSize = size + 'px');
  }
  spans.forEach(s => s.style.fontSize = size + 'px');
}
function configureMotion() {
  if (g('animation') !== '1') return;
  const intensity = Math.max(0, Math.min(100, parseFloat(g('animIntensity') || '45'))) / 100;
  const speed = Math.max(10, Math.min(100, parseFloat(g('animSpeed') || '60'))) / 100;
  document.body.classList.add('motion-enabled');
  document.documentElement.style.setProperty('--motion-mult', intensity.toFixed(2));
  document.documentElement.style.setProperty('--motion-speed-factor', (1.55 - speed).toFixed(2));
}
</script>
<div class="banner-bg">
  <div class="bg"></div>
  <div class="bg-overlay"></div>
</div>
<div class="layer">
  <div class="bl"><img src=""></div>
  <div class="logo-wrap"><img class="logo-mega" src=""></div>
  <div class="text-zone">
    <div class="title-block" id="titleBlock">
      <div class="title-wrap-d">
        <span class="t c0" id="dt1a"></span>
        <span class="t c1" id="dt1b"></span>
        <span class="t c2" id="dt1c"></span>
        <span class="t c3" id="dt1d"></span>
        <span class="t c4" id="dt1e"></span>
      </div>
      <div class="title-wrap-d">
        <span class="t c0" id="dt2a"></span>
        <span class="t c1" id="dt2b"></span>
        <span class="t c2" id="dt2c"></span>
        <span class="t c3" id="dt2d"></span>
        <span class="t c4" id="dt2e"></span>
      </div>
    </div>
  </div>
  <div class="dispo-outer">
    <span class="dispo-line"></span>
    <span class="dispo-line bot"></span>
  </div>
  <div class="center-group">
    <div class="b-back-l"><img src=""></div>
    <div class="b-back-r"><img src=""></div>
    <div class="disp"><img src=""></div>
  </div>
  <div class="cr1"><img src=""></div>
  <div class="cr2"><img src=""></div>
</div>
<script>
  // === JAUGES : lecture params URL ===
  (function() {
    const p = new URLSearchParams(window.location.search);
    const gn = k => parseFloat(p.get(k) || '0');
    const gp = k => parseFloat(p.get(k) || '100');
    const logoSize=gp('logoSize')/100, logoX=gn('logoX'), logoY=gn('logoY');
    const titreSize=gp('titreSize')/100, titreX=gn('titreX'), titreY=gn('titreY');
    const displaySize=gp('displaySize')/100, displayX=gn('displayX'), displayY=gn('displayY');
    const leftBoosterSize=gp('leftBoosterSize')/100, leftBoosterX=gn('leftBoosterX'), leftBoosterY=gn('leftBoosterY');
    const pairBoosterSize=gp('pairBoosterSize')/100, pairBoosterGap=gn('pairBoosterGap'), pairBoosterY=gn('pairBoosterY');
    const card1Size=gp('card1Size')/100, card1X=gn('card1X'), card1Y=gn('card1Y');
    const card2Size=gp('card2Size')/100, card2X=gn('card2X'), card2Y=gn('card2Y');
    const dispoSize=gp('dispoSize')/100, dispoX=gn('dispoX'), dispoY=gn('dispoY');

    function apply() {
      const logoWrap = document.querySelector('.logo-wrap');
      if (logoWrap) {
        logoWrap.style.transform = 'translate('+logoX+'px,'+logoY+'px) rotate(-5deg) scale('+logoSize+')';
      }
      const textZone = document.querySelector('.text-zone');
      if (textZone) {
        textZone.style.transform = 'translate('+titreX+'px,'+titreY+'px) rotate(-5deg) scale('+titreSize+')';
      }
      const disp = document.querySelector('.disp');
      if (disp) {
        disp.style.transform = 'translateX(calc(-50% + '+displayX+'px)) translateY('+displayY+'px) rotate(6deg) scale('+displaySize+')';
      }
      document.querySelectorAll('.b-back-l').forEach(el => {
        el.style.transform = 'translate('+(-pairBoosterGap)+'px,'+pairBoosterY+'px) rotate(-10deg) scale('+pairBoosterSize+')';
      });
      document.querySelectorAll('.b-back-r').forEach(el => {
        el.style.transform = 'translate('+pairBoosterGap+'px,'+pairBoosterY+'px) rotate(16deg) scale('+pairBoosterSize+')';
      });
      const bl = document.querySelector('.bl');
      if (bl) { bl.style.transform='translate('+leftBoosterX+'px,'+leftBoosterY+'px) rotate(-7deg) scale('+leftBoosterSize+')'; }
      const cr1 = document.querySelector('.cr1');
      if (cr1) { cr1.style.right=(parseFloat(cr1.style.right||200)-card1X)+'px'; cr1.style.top=(parseFloat(cr1.style.top||-55)+card1Y)+'px'; cr1.style.transform='rotate(-10deg) scale('+card1Size+')'; }
      const cr2 = document.querySelector('.cr2');
      if (cr2) { cr2.style.right=(parseFloat(cr2.style.right||52)-card2X)+'px'; cr2.style.top=(parseFloat(cr2.style.top||-38)+card2Y)+'px'; cr2.style.transform='rotate(7deg) scale('+card2Size+')'; }
      const dispo = document.querySelector('.dispo-outer');
      if (dispo) { dispo.style.transform='translate('+dispoX+'px,'+dispoY+'px) rotate(-5deg) scale('+dispoSize+')'; }
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', apply);
    else apply();
  })();
</script>
<script>
window.addEventListener('message', function(event) {
  if (!event.data || event.data.type !== 'banner-overrides') return;
  const ov = event.data.overrides || {};
  const n = (key, fallback) => Number.isFinite(Number(ov[key])) ? Number(ov[key]) : fallback;
  const transform = (selector, value) => {
    const el = document.querySelector(selector);
    if (el) el.style.transform = value;
  };
  transform('.logo-wrap', `translate(${n('logoX',0)}px,${n('logoY',0)}px) rotate(-5deg) scale(${n('logoSize',100)/100})`);
  transform('.text-zone', `translate(${n('titreX',0)}px,${n('titreY',0)}px) rotate(-5deg) scale(${n('titreSize',100)/100})`);
  transform('.disp', `translateX(calc(-50% + ${n('displayX',0)}px)) translateY(${n('displayY',0)}px) rotate(6deg) scale(${n('displaySize',100)/100})`);
  transform('.b-back-l', `translate(${-n('pairBoosterGap',0)}px,${n('pairBoosterY',0)}px) rotate(-10deg) scale(${n('pairBoosterSize',100)/100})`);
  transform('.b-back-r', `translate(${n('pairBoosterGap',0)}px,${n('pairBoosterY',0)}px) rotate(16deg) scale(${n('pairBoosterSize',100)/100})`);
  transform('.bl', `translate(${n('leftBoosterX',0)}px,${n('leftBoosterY',0)}px) rotate(-7deg) scale(${n('leftBoosterSize',100)/100})`);
  transform('.cr1', `translate(${n('card1X',0)}px,${n('card1Y',0)}px) rotate(-10deg) scale(${n('card1Size',100)/100})`);
  transform('.cr2', `translate(${n('card2X',0)}px,${n('card2Y',0)}px) rotate(7deg) scale(${n('card2Size',100)/100})`);
  transform('.dispo-outer', `translate(${n('dispoX',0)}px,${n('dispoY',0)}px) rotate(-5deg) scale(${n('dispoSize',100)/100})`);
});
</script>
</body>
